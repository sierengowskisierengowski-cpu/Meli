<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" width="220" height="280">
  <title>Meli logo — Amphora</title>
  <defs>
    <linearGradient id="am_body" x1="0" y1="40" x2="0" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#221a12"/>
      <stop offset="0.6" stop-color="#2c1f14"/>
      <stop offset="1" stop-color="#3a2818"/>
    </linearGradient>
    <linearGradient id="am_honey" x1="0" y1="130" x2="0" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.5" stop-color="#d4a017"/>
      <stop offset="1" stop-color="#8a5d05"/>
    </linearGradient>
    <radialGradient id="am_glow" cx="110" cy="140" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d4a017" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d4a017" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="am_clip">
      <path d="M 92 50 L 128 50 L 130 70 C 134 90 168 110 170 145 C 170 195 152 235 130 252 L 90 252 C 68 235 50 195 50 145 C 52 110 86 90 90 70 Z"/>
    </clipPath>
  </defs>
  <circle cx="110" cy="150" r="120" fill="url(#am_glow)"/>
  <!-- Left handle (curved) -->
  <path d="M 88 75 C 60 80 38 100 50 138" stroke="#d4a017" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Right handle -->
  <path d="M 132 75 C 160 80 182 100 170 138" stroke="#d4a017" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Amphora body — narrow neck, bulbous belly, pointed base -->
  <path d="M 92 50 L 128 50 L 130 70 C 134 90 168 110 170 145 C 170 195 152 235 130 252 L 90 252 C 68 235 50 195 50 145 C 52 110 86 90 90 70 Z"
        fill="url(#am_body)" stroke="#d4a017" stroke-width="2.4"/>
  <!-- Honey fill (~55%) -->
  <rect x="40" y="148" width="140" height="110" fill="url(#am_honey)" clip-path="url(#am_clip)"/>
  <!-- Honey surface -->
  <path d="M 56 150 Q 90 146 110 148 Q 150 150 168 148" stroke="#fde68a" stroke-width="1.6" fill="none" opacity="0.5" clip-path="url(#am_clip)"/>
  <!-- Neck rim -->
  <line x1="92" y1="50" x2="128" y2="50" stroke="#d4a017" stroke-width="2.4"/>
  <line x1="90" y1="70" x2="130" y2="70" stroke="#d4a017" stroke-width="1.6" opacity="0.7"/>
  <!-- Side specular highlight -->
  <path d="M 64 130 Q 56 175 70 220" stroke="#fef3c7" stroke-width="2.5" fill="none" opacity="0.10"/>
  <!-- Honey drip from rim -->
  <path d="M 124 50 Q 123 62 125 68 Q 127 62 126 50 Z" fill="#d4a017"/>
  <circle cx="125" cy="68" r="3" fill="#d4a017"/>
</svg>
