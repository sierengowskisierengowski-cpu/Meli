<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" width="220" height="280">
  <title>Meli logo — Classic Jar</title>
  <defs>
    <linearGradient id="cj_body" x1="0" y1="80" x2="0" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#221a12"/>
      <stop offset="0.5" stop-color="#2c1f14"/>
      <stop offset="1" stop-color="#3a2818"/>
    </linearGradient>
    <linearGradient id="cj_honey" x1="0" y1="140" x2="0" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.5" stop-color="#d4a017"/>
      <stop offset="1" stop-color="#8a5d05"/>
    </linearGradient>
    <radialGradient id="cj_glow" cx="110" cy="160" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d4a017" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d4a017" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cj_clip">
      <path d="M 72 80 L 148 80 L 148 92 C 152 100 188 110 188 132 C 190 168 190 200 188 232 C 184 238 168 240 168 240 L 52 240 C 52 240 36 238 32 232 C 30 200 30 168 32 132 C 32 110 68 100 72 92 Z"/>
    </clipPath>
  </defs>
  <!-- Soft honey halo -->
  <circle cx="110" cy="160" r="120" fill="url(#cj_glow)"/>
  <!-- Jar body -->
  <path d="M 72 80 L 148 80 L 148 92 C 152 100 188 110 188 132 C 190 168 190 200 188 232 C 184 238 168 240 168 240 L 52 240 C 52 240 36 238 32 232 C 30 200 30 168 32 132 C 32 110 68 100 72 92 Z"
        fill="url(#cj_body)" stroke="#d4a017" stroke-width="2.4"/>
  <!-- Honey fill (60%) -->
  <rect x="20" y="156" width="180" height="90" fill="url(#cj_honey)" clip-path="url(#cj_clip)"/>
  <!-- Honey surface highlight -->
  <path d="M 50 158 Q 90 154 110 156 Q 140 158 170 156" stroke="#fde68a" stroke-width="1.6" fill="none" opacity="0.5" clip-path="url(#cj_clip)"/>
  <!-- Lip line -->
  <line x1="72" y1="92" x2="148" y2="92" stroke="#d4a017" stroke-width="1.6" opacity="0.7"/>
  <!-- Body specular highlight -->
  <path d="M 48 140 Q 44 180 48 220" stroke="#fef3c7" stroke-width="2" fill="none" opacity="0.10"/>
  <!-- Hanging drip from rim -->
  <path d="M 145 92 Q 144 102 146 108 Q 148 102 147 92 Z" fill="#d4a017"/>
  <circle cx="146" cy="108" r="3.5" fill="#d4a017"/>
  <circle cx="145" cy="107" r="1" fill="#fde68a" opacity="0.6"/>
</svg>
