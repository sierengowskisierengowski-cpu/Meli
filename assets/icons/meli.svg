<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Meli honeypot icon — hexagon with M monogram -->
  <!-- Background hex -->
  <polygon points="64,4 112,30 112,82 64,108 16,82 16,30"
           fill="#0f172a" stroke="#f59e0b" stroke-width="4"/>
  <!-- Honeycomb inner hex -->
  <polygon points="64,18 100,38 100,78 64,98 28,78 28,38"
           fill="#1e293b" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.5"/>
  <!-- M letterform -->
  <text x="64" y="78" font-family="system-ui,sans-serif" font-size="52"
        font-weight="900" fill="#f59e0b" text-anchor="middle"
        letter-spacing="-2">M</text>
  <!-- Threat pulse dot — top right -->
  <circle cx="96" cy="28" r="7" fill="#ef4444" opacity="0.9"/>
  <circle cx="96" cy="28" r="12" fill="#ef4444" opacity="0.2"/>
</svg>
