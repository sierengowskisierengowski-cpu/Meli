name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            libgtk-4-dev \
            libadwaita-1-dev \
            python3-build \
            python3-setuptools

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt build

      - name: Build source distribution
        run: python -m build --sdist --wheel

      - name: Build .tar.gz release archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist-release
          cp -r meli install.sh uninstall.sh meli.desktop meli.service meli-ingest.service \
                pyproject.toml requirements.txt README.md LICENSE docs/ \
                dist-release/
          tar -czf "meli-${VERSION}-linux.tar.gz" -C dist-release .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meli-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
            meli-*-linux.tar.gz
          if-no-files-found: error

  publish-release:
    needs: build-deb
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: meli-dist
          path: release-files

      - name: List release files
        run: find release-files -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/**
          generate_release_notes: true
          body: |
            ## Install Meli

            **Arch Linux (AUR-style):**
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd Meli
            bash install.sh
            ```

            **Any Linux (from tarball):**
            ```bash
            tar -xzf meli-*-linux.tar.gz
            bash install.sh
            ```

            **Requirements:** Python 3.10+, GTK4, libadwaita, PyGObject

            See [INSTALL.md](https://github.com/${{ github.repository }}/blob/main/docs/INSTALL.md) for full instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
